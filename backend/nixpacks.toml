[variables]
NPM_CONFIG_UPDATE_NOTIFIER = "false"

[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "prisma generate"
]

[start]
cmd = "prisma generate && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
